<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر ميار | Mayar Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <h1 class="logo">ميار<span class="dot">.</span></h1>
            <nav>
                <ul>
                    <li><a href="#" class="active">الرئيسية</a></li>
                    <li><a href="#products">المنتجات</a></li>
                    <li><a href="#contact">اتصل بنا</a></li>
                    <li class="cart-icon"><a href="#"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero hero-animate">
        <div class="container hero-content">
            <h2 class="welcome-text">أهلاً بك في عالم ميار</h2>
            <p class="sub-text">تجربة تسوق عصرية وذكية، مصممة خصيصاً لك.</p>
            <a href="#products" class="btn btn-primary">اكتشف الآن</a>
        </div>
    </section>

    <section id="products" class="products-section">
        <div class="container">
            <h3 class="section-title">أحدث المنتجات</h3>
            <div class="product-grid" id="product-list">
                </div>
        </div>
    </section>

    <footer id="contact">
        <div class="container footer-content">
            <div class="footer-info">
                <h3>متجر ميار</h3>
                <p>كل ما تحتاجه في مكان واحد.</p>
            </div>
            <div class="footer-contact">
                <h4>تواصل معنا</h4>
                <p><i class="fas fa-phone"></i> +964 7XX XXX XXXX</p>
                <p><i class="fas fa-envelope"></i> ayser.contact@gmail.com</p>
            </div>
            <div class="footer-social">
                <h4>تابعنا</h4>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>جميع الحقوق محفوظة &copy; 2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
