<header>
    <a href="#" class="logo">ميار<span style="color:white">.</span></a>
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i>
        <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <h2>عالم ميار للفخامة</h2>
    <p>أرقى الأحذية والحقائب بين يديك</p>
</section>

<section class="products-container">
    <div class="product-grid" id="product-list"></div>
</section>

<div id="side-cart" class="side-cart">
    <h2 style="color:var(--gold); margin-bottom:20px">سلتك</h2>
    <div id="cart-items" style="flex-grow:1"></div>
    <div style="border-top:1px solid #333; padding-top:20px">
        <h3>المجموع: <span id="total-price">0</span></h3>
        <button class="btn" style="margin-top:20px" onclick="openCheckout()">إتمام الطلب</button>
        <button class="btn" style="background:none; color:white; margin-top:10px" onclick="toggleCart()">إغلاق</button>
    </div>
</div>

<div id="order-modal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold); margin-bottom:20px">معلومات التوصيل</h2>
        <input type="text" id="name" placeholder="الاسم الكامل">
        <input type="text" id="phone" placeholder="رقم الهاتف">
        <button class="btn" onclick="finishOrder()">تأكيد عبر واتساب</button>
    </div>
</div>
